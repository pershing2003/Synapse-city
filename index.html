<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse City</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #12141f;
  --panel: #1a1d2e;
  --panel2: #1f2235;
  --border: #2e3250;
  --ink: #e8ecff;
  --muted: #5a6080;
  --dim: #3a3f60;

–you:  #4fffb0;
–gaba: #ff6b6b;
–aden: #a0a8d0;
–sero: #74b9ff;
–fix:  #fd79a8;
–warn: #fdcb6e;
–bad:  #ff4757;

–hp-color: var(–you);
–scanline: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
background: var(–bg);
background-image: radial-gradient(ellipse at 20% 20%, rgba(79,255,176,0.04) 0%, transparent 60%),
radial-gradient(ellipse at 80% 80%, rgba(116,185,255,0.04) 0%, transparent 60%);
color: var(–ink);
font-family: ‘IBM Plex Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* scanline overlay */
body::before {
content: ‘’;
position: fixed; inset: 0;
background: var(–scanline);
pointer-events: none; z-index: 200;
opacity: 0.4;
}

/* ── LAYOUT ── */
#game {
max-width: 720px;
margin: 0 auto;
padding: 24px 20px 80px;
position: relative; z-index: 1;
}

/* ── HUD ── */
#hud {
position: sticky; top: 0; z-index: 50;
background: var(–bg);
border-bottom: 1px solid var(–border);
padding: 12px 0 10px;
margin-bottom: 28px;
display: flex; align-items: center; gap: 16px;
}

.hud-label {
font-family: ‘Press Start 2P’, monospace;
font-size: 7px; color: var(–muted);
white-space: nowrap;
}

.hp-bar-wrap {
flex: 1;
height: 10px;
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 2px;
overflow: hidden;
}

#hp-bar {
height: 100%;
background: var(–hp-color);
border-radius: 2px;
transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;
box-shadow: 0 0 8px var(–hp-color);
}

#hp-num {
font-family: ‘Press Start 2P’, monospace;
font-size: 8px; color: var(–hp-color);
min-width: 36px; text-align: right;
}

.hud-scene {
font-family: ‘Press Start 2P’, monospace;
font-size: 7px; color: var(–dim);
min-width: 60px; text-align: right;
}

/* ── SCENE ── */
.scene { display: none; }
.scene.active {
display: block;
animation: pop 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes pop {
from { opacity: 0; transform: translateY(12px) scale(0.99); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── LOCATION BANNER ── */
.location-bar {
font-family: ‘Press Start 2P’, monospace;
font-size: 8px;
color: var(–muted);
border: 1px solid var(–border);
background: var(–panel);
padding: 8px 14px;
border-radius: 4px;
margin-bottom: 20px;
letter-spacing: 1px;
}

.location-bar span { color: var(–you); }

/* ── SCENE TITLE ── */
.scene-title {
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(13px, 3vw, 18px);
line-height: 1.6;
color: var(–ink);
margin-bottom: 24px;
letter-spacing: -0.5px;
}

/* ── DIALOGUE BOX ── */
.dialogue {
background: var(–panel);
border: 2px solid var(–border);
border-radius: 8px;
padding: 0;
margin-bottom: 14px;
overflow: hidden;
}

.dialogue-header {
display: flex; align-items: center; gap: 10px;
padding: 10px 16px;
border-bottom: 1px solid var(–border);
background: var(–panel2);
}

.char-avatar {
width: 32px; height: 32px;
border-radius: 6px;
display: flex; align-items: center; justify-content: center;
font-size: 16px;
flex-shrink: 0;
border: 1.5px solid;
}

.char-name {
font-family: ‘Press Start 2P’, monospace;
font-size: 8px;
letter-spacing: 1px;
}

.char-title {
font-size: 10px; color: var(–muted);
margin-top: 2px;
}

.dialogue-body {
padding: 16px 18px;
font-size: 15px; line-height: 1.75;
color: #c8d0f0;
font-style: italic;
}

.dialogue-body strong { font-style: normal; font-weight: 600; }

/* character color schemes */
.c-you   { –cc: var(–you);  background: rgba(79,255,176,0.08);  border-color: rgba(79,255,176,0.3); }
.c-gaba  { –cc: var(–gaba); background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); }
.c-aden  { –cc: var(–aden); background: rgba(160,168,208,0.08); border-color: rgba(160,168,208,0.3); }
.c-sero  { –cc: var(–sero); background: rgba(116,185,255,0.08); border-color: rgba(116,185,255,0.3); }
.c-fix   { –cc: var(–fix);  background: rgba(253,121,168,0.08); border-color: rgba(253,121,168,0.3); }
.c-narr  { –cc: var(–warn); background: rgba(253,203,110,0.06); border-color: rgba(253,203,110,0.2); }

.dialogue-header .char-name { color: var(–cc); }
.char-avatar { border-color: var(–cc); color: var(–cc); background: transparent; }

/* ── NARRATOR (no border, just text) ── */
.narr {
font-size: 15px; line-height: 1.8;
color: #8a93bb;
margin-bottom: 14px;
padding: 0 4px;
font-style: italic;
}

.narr strong { color: var(–ink); font-style: normal; font-weight: 600; }
.narr em { color: var(–warn); font-style: normal; }

/* ── SCIENCE TIP ── */
.sci {
background: var(–panel2);
border: 1px solid var(–border);
border-left: 3px solid var(–you);
border-radius: 0 6px 6px 0;
padding: 14px 18px;
margin: 18px 0;
font-size: 13px; line-height: 1.7;
color: var(–muted);
}

.sci::before {
content: ‘🔬 BRAIN FACTS:’;
display: block;
font-family: ‘Press Start 2P’, monospace;
font-size: 7px; color: var(–you);
margin-bottom: 8px; letter-spacing: 1px;
}

/* ── CHOICES ── */
.choices {
display: flex; flex-direction: column; gap: 8px;
margin-top: 24px;
}

.btn {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 6px;
padding: 14px 18px;
color: var(–ink);
font-family: ‘IBM Plex Sans’, sans-serif;
font-size: 14.5px; line-height: 1.5;
cursor: pointer; text-align: left;
transition: all 0.18s;
display: flex; align-items: flex-start; gap: 12px;
position: relative; overflow: hidden;
}

.btn::after {
content: ‘’;
position: absolute; inset: 0;
background: var(–bc, var(–you));
opacity: 0; transition: opacity 0.18s;
}

.btn:hover::after { opacity: 0.07; }
.btn:hover {
border-color: var(–bc, var(–you));
transform: translateX(4px);
box-shadow: -3px 0 0 var(–bc, var(–you));
}

.btn-icon {
font-size: 18px; flex-shrink: 0;
position: relative; z-index: 1;
line-height: 1.4;
}

.btn span {
position: relative; z-index: 1;
}

.btn-hint {
display: block;
font-size: 11px; color: var(–muted);
margin-top: 3px; font-style: italic;
}

.b-good { –bc: var(–you); }
.b-risk { –bc: var(–warn); }
.b-bad  { –bc: var(–bad); }
.b-coc  { –bc: #ff4757; }
.b-opi  { –bc: #a29bfe; }
.b-caf  { –bc: var(–warn); }
.b-ser  { –bc: var(–sero); }
.b-neu  { –bc: var(–muted); }

/* ── HP CHANGE FLASH ── */
.hp-gain { animation: flashGreen 0.5s; }
.hp-lose { animation: flashRed 0.5s; }
@keyframes flashGreen {
0%,100% { background: var(–bg); }
50% { background: rgba(79,255,176,0.08); }
}
@keyframes flashRed {
0%,100% { background: var(–bg); }
50% { background: rgba(255,71,87,0.1); }
}

/* ── STATUS EFFECT ── */
.status-row {
display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
}
.status-badge {
font-family: ‘Press Start 2P’, monospace;
font-size: 7px; padding: 4px 8px;
border-radius: 3px; letter-spacing: 1px;
}
.st-ok    { background: rgba(79,255,176,0.1);  color: var(–you);  border: 1px solid rgba(79,255,176,0.3); }
.st-warn  { background: rgba(253,203,110,0.1); color: var(–warn); border: 1px solid rgba(253,203,110,0.3); }
.st-bad   { background: rgba(255,71,87,0.1);   color: var(–bad);  border: 1px solid rgba(255,71,87,0.3); }
.st-info  { background: rgba(116,185,255,0.1); color: var(–sero); border: 1px solid rgba(116,185,255,0.3); }

/* ── ENDING ── */
.ending-screen {
text-align: center;
padding: 20px 0;
}

.ending-big {
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(10px, 3vw, 16px);
line-height: 1.8; margin-bottom: 24px;
letter-spacing: 1px;
}

.ending-score {
font-family: ‘Press Start 2P’, monospace;
font-size: 11px; color: var(–muted);
margin-bottom: 8px;
}

.score-val {
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(28px, 8vw, 48px);
display: block; margin: 8px 0 20px;
}

.ending-blurb {
font-size: 15px; line-height: 1.8; color: #9aa3cc;
max-width: 520px; margin: 0 auto 28px;
font-style: italic;
}

.divider { border: none; border-top: 1px solid var(–border); margin: 28px 0; }

.restart-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }

.restart-btn {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 6px; padding: 10px 20px;
color: var(–muted);
font-family: ‘Press Start 2P’, monospace;
font-size: 8px; letter-spacing: 1px;
cursor: pointer; transition: all 0.2s;
}
.restart-btn:hover { border-color: var(–you); color: var(–you); }

/* ── MINI VISUAL ── */
.vis {
display: flex; align-items: center; justify-content: center;
gap: 10px; margin: 20px 0; flex-wrap: wrap;
}

.mol {
font-family: ‘Press Start 2P’, monospace;
font-size: 9px; padding: 8px 12px;
border: 1.5px solid; border-radius: 4px;
letter-spacing: 1px;
}

.mol-da  { color: var(–you);  border-color: var(–you);  background: rgba(79,255,176,0.08); }
.mol-ga  { color: var(–gaba); border-color: var(–gaba); background: rgba(255,107,107,0.08); }
.mol-se  { color: var(–sero); border-color: var(–sero); background: rgba(116,185,255,0.08); }
.mol-op  { color: #a29bfe;     border-color: #a29bfe;     background: rgba(162,155,254,0.08); }
.mol-coc { color: var(–bad);  border-color: var(–bad);  background: rgba(255,71,87,0.08); }
.mol-caf { color: var(–warn); border-color: var(–warn); background: rgba(253,203,110,0.08); }
.mol-ad  { color: var(–muted);border-color: var(–muted);background: rgba(90,96,128,0.08); }
.mol-re  { color: var(–warn); border-color: var(–warn); background: rgba(253,203,110,0.08); }
.mol-x   { color: var(–bad);  border-color: var(–bad);  background: rgba(255,71,87,0.06); opacity: 0.5; }

.vis-arrow { color: var(–muted); font-size: 16px; }
.vis-x     { color: var(–bad); font-size: 20px; font-weight: 700; }
.vis-check { color: var(–you); font-size: 18px; }

@media (max-width: 500px) {
.scene-title { font-size: 12px; }
.btn { font-size: 13px; padding: 12px 14px; }
.dialogue-body { font-size: 14px; }
}
</style>

</head>
<body>

<div id="game">
  <div id="hud" style="display:none">
    <span class="hud-label">BRAIN HP</span>
    <div class="hp-bar-wrap"><div id="hp-bar" style="width:100%"></div></div>
    <span id="hp-num">100</span>
    <span class="hud-scene" id="hud-scene">DAY 1</span>
  </div>
  <div id="scene-container"></div>
</div>

<script>
// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let hp = 100;
let flags = {};

function setHp(val) {
  const old = hp;
  hp = Math.max(0, Math.min(100, val));
  const bar = document.getElementById('hp-bar');
  const num = document.getElementById('hp-num');
  if (bar) bar.style.width = hp + '%';
  if (num) num.textContent = hp;

  // color shift
  if (hp > 60) { bar.style.background = 'var(--you)'; bar.style.boxShadow = '0 0 8px var(--you)'; document.documentElement.style.setProperty('--hp-color','var(--you)'); }
  else if (hp > 30) { bar.style.background = 'var(--warn)'; bar.style.boxShadow = '0 0 8px var(--warn)'; document.documentElement.style.setProperty('--hp-color','var(--warn)'); }
  else { bar.style.background = 'var(--bad)'; bar.style.boxShadow = '0 0 8px var(--bad)'; document.documentElement.style.setProperty('--hp-color','var(--bad)'); }

  // flash
  const body = document.body;
  body.classList.remove('hp-gain','hp-lose');
  void body.offsetWidth;
  body.classList.add(hp >= old ? 'hp-gain' : 'hp-lose');
}

function modHp(delta) { setHp(hp + delta); }

// ═══════════════════════════════════════════
// SCENE ENGINE
// ═══════════════════════════════════════════
const scenes = {};

function reg(id, fn) { scenes[id] = fn; }

function go(id, hpDelta) {
  if (hpDelta) modHp(hpDelta);
  const hud = document.getElementById('hud');
  if (id !== 'title') hud.style.display = 'flex';
  const sc = document.getElementById('hud-scene');
  if (sc) sc.textContent = id.toUpperCase();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  const container = document.getElementById('scene-container');
  container.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'scene active';
  div.innerHTML = scenes[id]();
  container.appendChild(div);
}

// ── HELPERS ──
const loc = (place, sub='') => `<div class="location-bar">📍 <span>${place}</span>${sub ? ' › ' + sub : ''}</div>`;
const title = t => `<h2 class="scene-title">${t}</h2>`;
const narr = t => `<p class="narr">${t}</p>`;

function dlg(char, emoji, charClass, name, role, text) {
  return `<div class="dialogue">
    <div class="dialogue-header ${charClass}">
      <div class="char-avatar ${charClass}">${emoji}</div>
      <div><div class="char-name">${name}</div><div class="char-title">${role}</div></div>
    </div>
    <div class="dialogue-body">${text}</div>
  </div>`;
}

const you   = (t) => dlg('you',  '⚡','c-you', 'YOU (DOPAMINE)','Courier, Reward District', t);
const gaba  = (t) => dlg('gaba', '🛡','c-gaba','GABA',          'Head of Security', t);
const aden  = (t) => dlg('aden', '😴','c-aden','ADENOSINE',     'Shift Supervisor, Tired Dept.', t);
const sero  = (t) => dlg('sero', '🌊','c-sero','SEROTONIN',     'Your Cousin, Mood District', t);
const fixer = (t) => dlg('fix',  '🎭','c-fix', 'THE FIXER',     'Unknown Origin', t);
const narrd = (t) => dlg('narr', '📖','c-narr','NARRATOR',      '', t);

const sci = t => `<div class="sci">${t}</div>`;
const vis = inner => `<div class="vis">${inner}</div>`;
const mol = (cls, t) => `<div class="mol ${cls}">${t}</div>`;
const arr = () => `<span class="vis-arrow">→</span>`;
const xmark = () => `<span class="vis-x">✗</span>`;
const check = () => `<span class="vis-check">✓</span>`;

const status = (...badges) => `<div class="status-row">${badges.map(([cls,t]) => `<span class="status-badge ${cls}">${t}</span>`).join('')}</div>`;

function choices(...opts) {
  return `<div class="choices">${opts.map(([cls, icon, text, hint, scene, delta]) =>
    `<button class="btn ${cls}" onclick="go('${scene}'${delta ? ','+delta : ''})">
      <span class="btn-icon">${icon}</span>
      <span>${text}${hint ? `<span class="btn-hint">${hint}</span>` : ''}</span>
    </button>`
  ).join('')}</div>`;
}

function endScreen(color, titleText, score, blurb, scoreColor) {
  return `<div class="ending-screen">
    <div class="ending-big" style="color:${color}">${titleText}</div>
    <div class="ending-score">BRAIN HEALTH SCORE</div>
    <span class="score-val" style="color:${scoreColor || color}">${score}</span>
    <p class="ending-blurb">${blurb}</p>
    <hr class="divider">
    <div class="restart-row">
      <button class="restart-btn" onclick="resetGame()">▶ PLAY AGAIN</button>
    </div>
  </div>`;
}

function resetGame() {
  hp = 100;
  flags = {};
  document.getElementById('hud').style.display = 'none';
  go('title');
}

// ═══════════════════════════════════════════
// SCENES
// ═══════════════════════════════════════════

// ── TITLE ──
reg('title', () => `
  <div style="padding: 20px 0 10px">
    <div style="font-family:'Press Start 2P',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:16px">A CHOOSE-YOUR-OWN-ADVENTURE</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:clamp(28px,8vw,52px);line-height:1.3;color:var(--you);text-shadow:0 0 40px rgba(79,255,176,0.4);margin-bottom:6px">SYNAPSE<br>CITY</div>
    <div style="font-family:'IBM Plex Sans',sans-serif;font-style:italic;font-size:17px;color:var(--muted);margin-bottom:48px;line-height:1.5">You are Dopamine.<br>The city needs you. The city might destroy you.</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);margin-bottom:20px;letter-spacing:2px">THE CAST:</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:40px">
      ${['⚡ YOU — Dopamine. Courier. Keeps the city motivated.','🛡 GABA — Head of Security. Keeps everything from going off the rails.','😴 ADENOSINE — The tired coworker who wants everyone to go home.','🌊 SEROTONIN — Your anxious cousin. Works the mood district.','🎭 THE FIXER — Shows up when drugs enter the picture. Trust no one.'].map(c => `<div style="font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#7a85aa;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:4px">${c}</div>`).join('')}
    </div>
    ${choices(
      ['b-good','▶','START GAME','Your shift begins now.','intro', null]
    )}
  </div>
`);

// ── INTRO ──
reg('intro', () => `
  ${loc('SYNAPSE CITY', 'Morning Briefing')}
  ${title('WELCOME TO THE JOB')}
  ${narr('Every morning in <strong>Synapse City</strong>, the same routine. Neurons fire, vesicles burst open, and you pour out into the gap between two brain cells — the synaptic cleft. Cross it, hit the receptor, deliver your message, get recycled. Repeat.')}
  ${you('"I\'ve done this a million times. Literally a million. The job is simple: get across the cleft, dock to the receptor, send the \'something good happened\' signal, come home. Clean. Easy. Except today feels different."')}
  ${narr('The message you carry? <em>Something is worth doing again.</em> That\'s it. You\'re not happiness — you\'re motivation. You\'re the little flag the brain plants on a memory that says: <strong>remember this one.</strong>')}
  ${sci('Dopamine is released when the brain expects or receives a reward. It teaches the brain what to want more of. It\'s not the pleasure itself — it\'s the "I want to do that again" feeling.')}
  ${choices(
    ['b-good','→','Head to the dispatch station','Begin your shift.','dispatch', null]
  )}
`);

// ── DISPATCH ──
reg('dispatch', () => `
  ${loc('DISPATCH STATION', 'Pre-Shift')}
  ${title('SOMETHING IS IN THE AIR')}
  ${you('"Okay. Just another delivery run across the cleft. Cross, bind, recycle. Cross, bind, recycle. I could do this asleep."')}
  ${gaba('"Not so fast, courier. Today\'s forecast is... complicated. Something entered the bloodstream last night. I don\'t know exactly what yet, but the city\'s chemistry is already shifting. Choose your route carefully."')}
  ${you('"Great. Wonderful. What are my options?"')}
  ${gaba('"Five routes today. Each one leads somewhere different. And your brain health score depends on what you encounter out there."')}
  ${narr('You look out at the synaptic cleft. Five paths shimmer in front of you.')}
  ${choices(
    ['b-good',  '⚡','ROUTE 1: The Clean Run',     'A normal day. Nothing unusual.', 'n1', null],
    ['b-coc',   '❄','ROUTE 2: The Blocked Exit',   'Something is jamming the recycling door.', 'c1', null],
    ['b-opi',   '💊','ROUTE 3: The Silent Guard',   'Security is offline. Something got to GABA.', 'o1', null],
    ['b-caf',   '☕','ROUTE 4: The Sleepy Coworker','Adenosine is acting strange.', 'ca1', null],
    ['b-ser',   '🌊','ROUTE 5: The Mood District',  'Serotonin called in sick. Again.', 'ss1', null]
  )}
`);

// ════════════════════════════════
// ROUTE 1 — NORMAL
// ════════════════════════════════
reg('n1', () => `
  ${status(['st-ok','HP: NORMAL'],['st-info','ROUTE: CLEAN RUN'])}
  ${loc('SYNAPTIC CLEFT', 'Midmorning')}
  ${title('CROSSING THE GAP')}
  ${narr('You launch out of the vesicle and drift across the cleft. Twenty nanometers of open space. It\'s actually kind of peaceful out here.')}
  ${you('"Alright. Receptor\'s on the other side. I can see it from here — shaped exactly like me, which is either flattering or terrifying."')}
  ${narr('On the other side, the receiving neuron\'s receptor is waiting. It\'s a lock. You are the key. The fit is perfect — billions of years of evolution made sure of that.')}
  ${vis(mol('mol-da','YOU') + arr() + mol('mol-re','RECEPTOR') + check())}
